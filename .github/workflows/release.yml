name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file CHANGELOG.md

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: gitwasm-linux-x86_64
            binary: gitwasm
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gitwasm-macos-aarch64
            binary: gitwasm
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gitwasm-windows-x86_64.exe
            binary: gitwasm.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1, wasm32-unknown-unknown, ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p gitwasm --target ${{ matrix.target }}
      - name: Rename artifact
        shell: bash
        run: cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.artifact }}"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.artifact }}" --clobber
